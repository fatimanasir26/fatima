<!DOCTYPE html>
<html>
<head>
  <title>Colorful House</title>

  <style>
    body{
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:skyblue;
    }

    .scene{
      position:relative;
      width:600px;
      height:400px;
      background:#c8f0ff;
      overflow:hidden;
    }

    /* Sun */
    .sun{
      width:80px;
      height:80px;
      background:yellow;
      border-radius:50%;
      position:absolute;
      top:30px;
      right:40px;
    }

    /* Ground */
    .ground{
      width:100%;
      height:120px;
      background:green;
      position:absolute;
      bottom:0;
    }

    /* House body */
    .house{
      width:250px;
      height:180px;
      background:#ffb347;
      position:absolute;
      bottom:120px;
      left:175px;
    }

    /* Roof */
    .roof{
      width:0;
      height:0;
      border-left:140px solid transparent;
      border-right:140px solid transparent;
      border-bottom:120px solid brown;
      position:absolute;
      top:-120px;
      left:-15px;
    }

    /* Door */
    .door{
      width:60px;
      height:100px;
      background:#5c4033;
      position:absolute;
      bottom:0;
      left:95px;
      border-radius:5px;
    }

    .knob{
      width:10px;
      height:10px;
      background:gold;
      border-radius:50%;
      position:absolute;
      top:50px;
      right:8px;
    }

    /* Windows */
    .window{
      width:50px;
      height:50px;
      background:#87ceeb;
      border:4px solid white;
      position:absolute;
      top:50px;
    }

    .left-window{
      left:25px;
    }

    .right-window{
      right:25px;
    }

    /* Window lines */
    .window::before,
    .window::after{
      content:"";
      position:absolute;
      background:white;
    }

    .window::before{
      width:4px;
      height:100%;
      left:50%;
      transform:translateX(-50%);
    }

    .window::after{
      height:4px;
      width:100%;
      top:50%;
      transform:translateY(-50%);
    }

  </style>
</head>

<body>

  <div class="scene">

    <div class="sun"></div>

    <div class="ground"></div>

    <div class="house">

      <div class="roof"></div>

      <div class="window left-window"></div>

      <div class="window right-window"></div>

      <div class="door">
        <div class="knob"></div>
      </div>

    </div>

  </div>

</body>
</html>
